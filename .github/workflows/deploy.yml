name: Pygame Web Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-n-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Build with pygbag
      run: |
        python -m pip install pygbag
        python -m pygbag --ume_block 0 --template noctx --build .

    - name: Patch HTML for cross-browser support
      run: |
        python3 << 'PATCH_SCRIPT'
        import re

        with open('build/web/index.html', 'r') as f:
            html = f.read()

        # 1. Meta tags for Edge/IE compatibility + viewport for mobile
        meta_patch = '''<meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="mobile-web-app-capable" content="yes">'''

        # 2. AudioContext unlock + Edge WebAssembly fix + Loading spinner
        script_patch = '''<script>
        // Audio unlock for all browsers
        (function(){
          var ac=null;
          function u(){
            if(ac&&ac.state==='running')return;
            try{
              var A=window.AudioContext||window.webkitAudioContext;
              if(!ac)ac=new A();
              if(ac.state==='suspended')ac.resume();
              var b=ac.createBuffer(1,1,22050);
              var s=ac.createBufferSource();
              s.buffer=b;s.connect(ac.destination);s.start(0);
            }catch(e){}
          }
          ['click','touchstart','keydown','mousedown'].forEach(function(e){
            document.addEventListener(e,u,{once:false,passive:true});
          });
          if(!window.AudioContext&&window.webkitAudioContext)
            window.AudioContext=window.webkitAudioContext;
        })();

        // Edge/Chromium: SharedArrayBuffer polyfill check
        (function(){
          if(typeof SharedArrayBuffer==='undefined'){
            console.warn('SharedArrayBuffer not available, using fallback');
            try{window.SharedArrayBuffer=ArrayBuffer;}catch(e){}
          }
        })();

        // Prevent keyboard events from scrolling the page (Edge issue)
        window.addEventListener('keydown', function(e){
          if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space',' '].indexOf(e.key)!==-1){
            e.preventDefault();
          }
        }, {passive: false});

        // Prevent touch scrolling on canvas
        document.addEventListener('touchmove', function(e){
          if(e.target.tagName==='CANVAS') e.preventDefault();
        }, {passive: false});
        </script>'''

        # 3. Loading spinner CSS
        style_patch = '''<style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; }
        canvas { display: block; margin: 0 auto; touch-action: none; }
        #loading-overlay {
          position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          background: #1a1a2e; display: flex; flex-direction: column;
          align-items: center; justify-content: center; z-index: 9999;
          transition: opacity 0.5s;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .spinner {
          width: 60px; height: 60px; border: 6px solid #333;
          border-top: 6px solid #ffd700; border-radius: 50%;
          animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .loading-text { color: #ffd700; font-family: Arial, sans-serif; font-size: 18px; }
        .loading-sub { color: #888; font-family: Arial, sans-serif; font-size: 13px; margin-top: 8px; }
        .loading-tip { color: #aaa; font-family: Arial, sans-serif; font-size: 12px; margin-top: 20px; max-width: 300px; text-align: center; }
        </style>'''

        # 4. Loading overlay HTML (before canvas)
        overlay_html = '''<div id="loading-overlay">
          <div class="spinner"></div>
          <div class="loading-text">🐴 Feed the Herd 🥕</div>
          <div class="loading-sub">Oyun yükleniyor...</div>
          <div class="loading-tip">İlk yüklemede biraz zaman alabilir.<br>Lütfen bekleyin.</div>
        </div>
        <script>
        // Hide loading overlay when pygame canvas is ready
        (function checkReady(){
          var canvas = document.querySelector('canvas');
          if(canvas && canvas.width > 100){
            var ov = document.getElementById('loading-overlay');
            if(ov){ ov.classList.add('hidden'); setTimeout(function(){ov.remove();}, 600); }
          } else {
            setTimeout(checkReady, 300);
          }
        })();
        // Fallback: remove after 30s max
        setTimeout(function(){
          var ov = document.getElementById('loading-overlay');
          if(ov){ ov.classList.add('hidden'); setTimeout(function(){ov.remove();}, 600); }
        }, 30000);
        </script>'''

        # Apply patches
        html = html.replace('<head>', '<head>\n' + meta_patch, 1)
        html = html.replace('<head>', '<head>\n' + style_patch, 1)
        html = html.replace('</head>', script_patch + '\n</head>', 1)
        html = html.replace('<body>', '<body>\n' + overlay_html, 1)

        # 5. Prevent canvas focus issues in Edge
        html = html.replace('</body>', '''<script>
        // Ensure canvas gets focus for keyboard events (Edge fix)
        document.addEventListener('DOMContentLoaded', function(){
          var waitCanvas = setInterval(function(){
            var c = document.querySelector('canvas');
            if(c){
              clearInterval(waitCanvas);
              c.setAttribute('tabindex', '0');
              c.focus();
              c.addEventListener('click', function(){ c.focus(); });
              c.addEventListener('touchstart', function(){ c.focus(); });
              // Prevent right-click context menu
              c.addEventListener('contextmenu', function(e){ e.preventDefault(); });
            }
          }, 200);
        });
        </script>\n</body>''', 1)

        with open('build/web/index.html', 'w') as f:
            f.write(html)
        print('Full browser compatibility patch applied')
        PATCH_SCRIPT

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: build/web
        branch: gh-pages

    - name: Install butler (itch.io CLI)
      run: |
        curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
        unzip butler.zip
        chmod +x butler
        ./butler -V

    - name: Deploy to itch.io
      env:
        BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      run: |
        ./butler push build/web iremhamurcuoglu/hungry-herd:html5
