name: Pygame Web Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-n-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Sync nested source into root
      run: |
        for f in main.py sound_manager.py constants.py entities.py enums.py assets_loader.py streamlit_app.py requirements.txt README.md INSTRUCTIONS.md; do
          if [ -f "hungry_herd_game/$f" ]; then
            cp "hungry_herd_game/$f" "$f"
          fi
        done
        if [ -d "hungry_herd_game/assets" ]; then
          rm -rf assets
          cp -R hungry_herd_game/assets assets
        fi
    - name: Build with pygbag
      run: |
        python -m pip install pygbag
        python -m pygbag --build --disable-sound-format-error .

    - name: Patch HTML for cross-browser support
      run: |
        python3 <<'PY'
        import os

        patch = '''<script>
        (function(){
          var ac=null;
          function u(){
            if(ac&&ac.state==='running')return;
            try{
              var A=window.AudioContext||window.webkitAudioContext;
              if(!ac)ac=new A();
              if(ac.state==='suspended')ac.resume();
              var b=ac.createBuffer(1,1,22050);
              var s=ac.createBufferSource();
              s.buffer=b;s.connect(ac.destination);s.start(0);
            }catch(e){}
          }
          ['click','touchstart','keydown','mousedown'].forEach(function(e){
            document.addEventListener(e,u,{once:false,passive:true});
          });
          if(!window.AudioContext&&window.webkitAudioContext)
            window.AudioContext=window.webkitAudioContext;
        })();
        </script>'''

        intro = '''<style>
        #feed-herd-ready{
          position:fixed;
          inset:0;
          z-index:9999;
          display:flex;
          align-items:center;
          justify-content:center;
          background:radial-gradient(circle at 20% 20%, #3a5f34 0%, #1f2f1d 50%, #10170f 100%);
          color:#f8f1d5;
          font-family: 'Trebuchet MS', 'Verdana', sans-serif;
          transition:opacity .45s ease;
        }
        #feed-herd-ready.hidden{
          opacity:0;
          pointer-events:none;
        }
        #feed-herd-card{
          width:min(92vw, 520px);
          border:2px solid rgba(248,241,213,.5);
          background:rgba(10,18,9,1);
          border-radius:20px;
          padding:28px 24px;
          text-align:center;
          box-shadow:0 20px 50px rgba(0,0,0,.45);
        }
        #feed-herd-title{
          margin:0;
          font-size:clamp(32px, 8vw, 56px);
          letter-spacing:2px;
        }
        #feed-herd-emoji{
          margin:10px 0 14px;
          font-size:clamp(20px, 4.5vw, 30px);
          letter-spacing:6px;
        }
        #feed-herd-readyline{
          margin:0;
          font-size:clamp(18px, 3.7vw, 26px);
          font-weight:700;
        }
        #feed-herd-note{
          margin:10px 0 0;
          font-size:clamp(13px, 2.9vw, 16px);
          color:#d6e3c6;
        }
        @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.5;} }
        </style>
        <div id="feed-herd-ready">
          <div id="feed-herd-card">
            <h1 id="feed-herd-title">FEED HERD</h1>
            <div id="feed-herd-emoji">🐴 🥕 🌾 🍎</div>
            <p id="feed-herd-note">Oyun yuklenmesi biraz surebilir, lutfen bekleyin...</p>
            <p style="margin:8px 0 0;font-size:clamp(11px,2.5vw,13px);color:#b8c9a8;">! Oyuna basladiktan sonra baska sayfaya gecis yapmayiniz</p>
            <p id="feed-herd-readyline" style="display:none;margin:12px 0 0;font-size:clamp(20px,4.5vw,28px);font-weight:700;color:#ffd84d;animation:pulse 1s infinite;">✨ Hazır! Başlamak için tıklayın ✨</p>
          </div>
        </div>
        <script>
        (function(){
          function suppressLegacyOverlay(){
            var legacy=document.getElementById('loading-overlay');
            if(legacy){ legacy.style.display='none'; }
            var infobox=document.getElementById('infobox');
            if(infobox){ infobox.style.display='none'; }
          }
          function hideOverlay(){
            var ov=document.getElementById('feed-herd-ready');
            if(!ov) return;
            ov.classList.add('hidden');
            setTimeout(function(){ if(ov&&ov.parentNode){ ov.parentNode.removeChild(ov); } }, 550);
          }
          var startTime = Date.now();
          function checkReady(){
            suppressLegacyOverlay();
          }
          checkReady();
          
          // 30 saniye sonra "Devam Et" butonu göster
          setTimeout(function(){
            var card = document.getElementById('feed-herd-card');
            if(!card) return;
            var note = document.getElementById('feed-herd-note');
            if(note){ note.style.display='none'; }
            var notes = card.querySelectorAll('p');
            notes.forEach(function(p){ p.style.display='none'; });
            
            var btn = document.createElement('button');
            btn.textContent = '▶ Devam Et';
            btn.style.cssText = 'margin-top:20px;padding:14px 32px;font-size:20px;font-weight:700;background:#ffd84d;color:#1f2f1d;border:none;border-radius:12px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);';
            btn.onclick = function(){ hideOverlay(); };
            card.appendChild(btn);
          }, 30000);
          
          if(document.readyState==='loading'){
            document.addEventListener('DOMContentLoaded', checkReady, {once:true});
          }else{
            checkReady();
          }
          setTimeout(function(){
            var note=document.getElementById('feed-herd-note');
            if(note && note.style.display !== 'none'){
              note.textContent='Yukleme devam ediyor, ilk acilis 1 dakikaya kadar surebilir...';
            }
          }, 25000);
        })();
        </script>'''

        with open('build/web/index.html', 'r') as f:
            html = f.read()

        cb = os.environ.get('GITHUB_SHA', 'dev')[:8]
        html = html.replace('<head>', '<head>' + patch, 1)
        # Force browsers not to cache index.html
        html = html.replace(
            '<meta charset="UTF-8">',
            '<meta charset="UTF-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">'
        )
        html = html.replace('<body>', '<body>' + intro, 1)
        html = html.replace('Ready to start ! Please click/touch page', '')
        html = html.replace('Loading, please wait...', '')
        html = html.replace('Loading...', '')
        # Hide the default pygbag infobox so it never overlaps our overlay


        # Hide the default pygbag infobox so it never overlaps our overlay
        html = html.replace(
            '/*           display: none; */',
            'display: none;'
        )
        for src in ('hungry_herd_game.apk', 'hungry_herd_game.tar.gz'):
            html = html.replace(f'"{src}"', f'"{src}?v={cb}"')
            html = html.replace(f"'{src}'", f"'{src}?v={cb}'")

        with open('build/web/index.html', 'w') as f:
            f.write(html)

        print(f'Browser patch injected with cache-bust v={cb}')
        PY

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: build/web
        branch: gh-pages